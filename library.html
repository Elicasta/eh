<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library | Living Word Studio</title>
  <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/pages.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
<div class="app-wrapper">
  <aside id="sidebar" class="sidebar"></aside>

  <main class="main-content">

    <header class="page-header">
      <div>
        <div class="page-header-title">Library</div>
        <div class="page-header-subtitle" id="lesson-count">Loading…</div>
      </div>
      <div class="page-header-actions">
        <a href="lesson-builder.html" class="btn btn--primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Lesson
        </a>
      </div>
    </header>

    <div class="page-body">

      <!-- Filters -->
      <div class="library-filters">
        <!-- Search -->
        <div class="search-bar">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="library-search" placeholder="Search by title, scripture, series…" aria-label="Search library">
        </div>

        <!-- Status filter pills -->
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="tag active" data-status-filter="all">All</button>
          <button class="tag" data-status-filter="in_progress">In Progress</button>
          <button class="tag" data-status-filter="ready">Ready</button>
          <button class="tag" data-status-filter="preached">Preached</button>
          <button class="tag" data-status-filter="draft">Draft</button>
          <button class="tag" data-status-filter="archived">Archived</button>
        </div>

        <!-- Series filter -->
        <div class="filter-group">
          <span class="filter-label">Series:</span>
          <select class="filter-select" id="lib-series-filter">
            <option value="all">All Series</option>
          </select>
        </div>
      </div>

      <!-- Content -->
      <div id="library-content">
        <!-- Rendered by library.js -->
        <div class="library-section">
          <div class="section-header">
            <div class="section-title">Loading…</div>
          </div>
          <div class="lessons-list">
            <div class="skeleton" style="height:72px;border-radius:var(--radius-md);"></div>
            <div class="skeleton" style="height:72px;border-radius:var(--radius-md);margin-top:10px;"></div>
            <div class="skeleton" style="height:72px;border-radius:var(--radius-md);margin-top:10px;"></div>
          </div>
        </div>
      </div>

    </div>

    <div class="mobile-nav-spacer"></div>
  </main>

  <nav id="mobile-nav" class="mobile-nav"></nav>
</div>

<script src="assets/js/utils.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/navigation.js"></script>
<script src="assets/js/library.js"></script>
</body>
</html>
